<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナツノヒビ</title>
  <style>
    :root {
      --sky: #6ecbf4;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: sans-serif;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    video {
      width: 420px;
      max-width: 90vw;
      display: block;
      margin: 0 auto 20px;
    }

    .copy {
      color: var(--sky);
      font-size: 18px;
      letter-spacing: 0.08em;
      line-height: 1.7;
      margin-bottom: 120px;
    }

    .vertical {
      width: 360px;
      max-width: 85vw;
      display: block;
      margin: 0 auto 80px;
    }

    .coming {
      color: var(--sky);
      font-size: 26px;
      margin: 0 0 50px;
    }

    .bottom {
      width: 220px;
      max-width: 65vw;
      display: block;
      margin: 0 auto 80px;
    }
  </style>
</head>
<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="bf.MP4" type="video/mp4">
    </video>

    <div class="copy">ひんやかワクワク、ひと夏の思い出</div>
  </section>

  <img src="logo-vertical.png" alt="ナツノヒビ" class="vertical">

  <div class="coming">coming this summer</div>

  <img src="logo-small.png" alt="ナツノヒビ ロゴ" class="bottom">

</body>
</html>
