<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナツノヒビ ～夏限定のかき氷屋さん</title>

  <style>
    :root {
      --sky: #6ecbf4;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* 動画（少し控えめ） */
    video {
      width: 300px;
      max-width: 65vw;
      display: block;
      margin: 0 auto 20px;
    }

    .copy {
      color: var(--sky);
      font-size: 18px;
      letter-spacing: 0.08em;
      line-height: 1.7;
      margin-bottom: 140px;
    }

    /* 縦ロゴ（フワッと） */
    .vertical {
      width: 380px;
      max-width: 85vw;
      display: block;
      margin: 0 auto 100px;

      opacity: 0;
      transform: translateY(140px) scale(0.96);
      transition:
        opacity 3s ease-out,
        transform 3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .vertical.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .coming {
      color: var(--sky);
      font-size: 24px;
      margin-bottom: 60px;
    }

    .bottom {
      width: 240px;
      max-width: 70vw;
      margin-bottom: 80px;
    }
  </style>
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="bf.mp4" type="video/mp4">
    </video>

    <div class="copy">ひんやかワクワク、ひと夏の思い出</div>
  </section>

  <!-- 縦ロゴ -->
  <img src="logo-vertical.png" alt="ナツノヒビ" class="vertical">

  <div class="coming">coming this summer</div>

  <img src="logo-small.png" alt="ナツノヒビ ロゴ" class="bottom">

  <script>
    const el = document.querySelector('.vertical');

    window.addEventListener('scroll', () => {
      const rect = el.getBoundingClientRect();

      // 少し遅めに出る設定（ここが気持ちよさ）
      if (rect.top < window.innerHeight * 0.7) {
        el.classList.add('show');
      }
    });
  </script>

</body>
</html>
