<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナツノヒビ</title>

<style>
:root {
  --sky: #6ecbf4;
}

body {
  margin: 0;
  background: #ffffff;
  font-family: sans-serif;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 上のセクション */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

video {
  width: 140px;
  margin-bottom: 10px;
}

.copy {
  color: var(--sky);
  font-size: 12px;
  margin-bottom: 40px;
}

/* 縦ロゴ */
.vertical {
  width: 120px;
  margin: 100px auto;
  display: block;

  opacity: 0;
  transform: translateY(80px);
  transition: all 1.2s ease;
}

.vertical.show {
  opacity: 1;
  transform: translateY(0);
}

/* 下ロゴ */
.bottom {
  width: 120px;
  margin: 80px auto 40px;
}

.coming {
  color: var(--sky);
  margin-top: 30px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- 上 -->
  <div class="hero">
    <video autoplay muted loop playsinline>
      <source src="bf.mp4" type="video/mp4">
    </video>
    <div class="copy">ひんやかワクワク、ひと夏の思い出</div>
  </div>

  <!-- 縦ロゴ -->
  <img src="logo-vertical.png" class="vertical">

  <!-- 下 -->
  <div class="coming">coming this summer</div>
  <img src="logo-small.png" class="bottom">

</div>

<script>
const el = document.querySelector('.vertical');

window.addEventListener('scroll', () => {
  const rect = el.getBoundingClientRect();
  if (rect.top < window.innerHeight * 0.85) {
    el.classList.add('show');
  }
});
</script>

</body>
</html>
