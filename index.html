<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナツノヒビ ～夏限定のかき氷屋さん</title>

  <style>
    :root {
      --sky: #6ecbf4;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: sans-serif;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* ① 動画を少し小さく */
    video {
      width: 300px;
      max-width: 65vw;
      display: block;
      margin: 0 auto 20px;
    }

    .copy {
      color: var(--sky);
      font-size: 18px;
      letter-spacing: 0.08em;
      line-height: 1.7;
      margin-bottom: 120px;
    }

    /* ② 縦ロゴ（最初は隠す） */
    .vertical {
      width: 360px;
      max-width: 85vw;
      display: block;
      margin: 0 auto 80px;

      opacity: 0;
      transform: translateY(80px);
      transition: all 2.5s ease; /* ← ゆっくり */
    }

    .vertical.show {
      opacity: 1;
      transform: translateY(0);
    }

    .coming {
      color: var(--sky);
      font-size: 26px;
      margin: 0 0 50px;
    }
  </style>
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="bf.mp4" type="video/mp4">
    </video>

    <div class="copy">ひんやかワクワク、ひと夏の思い出</div>
  </section>

  <!-- 縦ロゴ -->
  <img src="logo-vertical.png" alt="ナツノヒビ" class="vertical">

  <div class="coming">coming this summer</div>

  <!-- JS（ここが肝） -->
  <script>
    const el = document.querySelector('.vertical');

    window.addEventListener('scroll', () => {
      const rect = el.getBoundingClientRect();

      if (rect.top < window.innerHeight * 0.8) {
        el.classList.add('show');
      }
    });
  </script>

</body>
</html>
