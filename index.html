<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナツノヒビ</title>

<style>
:root {
  --sky: #6ecbf4;
}

body {
  margin: 0;
  background: #ffffff;
  font-family: sans-serif;
}

/* 全体 */
.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 最初の画面 */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 動画（サイズアップ） */
video {
  width: 240px;
  max-width: 70vw;
  margin-bottom: 14px;
}

/* コピー */
.copy {
  color: var(--sky);
  font-size: 14px;
  letter-spacing: 1px;
}

/* スクロール用の余白（ここが重要） */
.spacer {
  height: 70vh;
}

/* 縦ロゴ（最初は隠す） */
.vertical {
  width: 200px;
  max-width: 60vw;
  display: block;
  margin: 0 auto 60px;

  opacity: 0;
  transform: translateY(100px);
  transition: all 1.2s ease;
}

/* 表示された状態 */
.vertical.show {
  opacity: 1;
  transform: translateY(0);
}

/* coming */
.coming {
  color: var(--sky);
  font-size: 20px;
  margin-bottom: 40px;
}

/* 下ロゴ */
.bottom {
  width: 160px;
  max-width: 50vw;
  margin-bottom: 60px;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- 最初の画面 -->
  <div class="hero">
    <video autoplay muted loop playsinline>
      <source src="bf.mp4" type="video/mp4">
    </video>
    <div class="copy">ひんやかワクワク、ひと夏の思い出</div>
  </div>

  <!-- 空間（ここが演出の肝） -->
  <div class="spacer"></div>

  <!-- 縦ロゴ -->
  <img src="logo-vertical.png" class="vertical">

  <!-- 下 -->
  <div class="coming">coming this summer</div>
  <img src="logo-small.png" class="bottom">

</div>

<script>
const el = document.querySelector('.vertical');

window.addEventListener('scroll', () => {
  const rect = el.getBoundingClientRect();

  if (rect.top < window.innerHeight * 0.8) {
    el.classList.add('show');
  }
});
</script>

</body>
</html>
